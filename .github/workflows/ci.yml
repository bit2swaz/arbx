name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ARBITRUM_RPC_URL: "https://arb1.alchemyapi.io/v2/test"
  ARBITRUM_SEPOLIA_RPC_URL: "https://arb-sepolia.g.alchemy.com/v2/test"
  ARB_EXECUTOR_ADDRESS: "0x0000000000000000000000000000000000000001"
  PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

jobs:
  workspace_check:
    name: Workspace has members
    runs-on: ubuntu-latest
    outputs:
      has_members: ${{ steps.check.outputs.has_members }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          COUNT=$(cargo metadata --no-deps --format-version 1 2>/dev/null \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)['packages']))" \
            2>/dev/null || echo "0")
          if [ "$COUNT" != "0" ]; then
            echo "has_members=true" >> $GITHUB_OUTPUT
          else
            echo "has_members=false" >> $GITHUB_OUTPUT
            echo "Workspace has no members yet — skipping cargo jobs."
          fi

  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    needs: workspace_check
    if: needs.workspace_check.outputs.has_members == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "arbx-stable"

      - name: Verify Cargo.lock is committed
        run: git ls-files --error-unmatch Cargo.lock

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy — deny all warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install and run cargo-audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit