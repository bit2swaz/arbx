name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  workspace_check:
    name: Check workspace has members
    runs-on: ubuntu-latest
    outputs:
      has_members: ${{ steps.check.outputs.has_members }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          COUNT=$(cargo metadata --no-deps --format-version 1 2>/dev/null \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)['packages']))" \
            2>/dev/null || echo "0")
          echo "has_members=$( [ "$COUNT" != "0" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  audit:
    name: cargo-audit — Known Vulnerabilities
    runs-on: ubuntu-latest
    needs: workspace_check
    if: needs.workspace_check.outputs.has_members == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "arbx-security"
      - run: cargo install cargo-audit --locked 2>/dev/null || true
      - run: cargo audit

  deny:
    name: cargo-deny — License Compliance + Duplicate Deps
    runs-on: ubuntu-latest
    needs: workspace_check
    if: needs.workspace_check.outputs.has_members == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          manifest-path: ./crates/common/Cargo.toml

  secrets:
    name: Gitleaks — Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}