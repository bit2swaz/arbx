# Anvil mainnet fork config — pre-mainnet, end-to-end pipeline validation.
#
# Architecture:
#   State  → Anvil fork of Arbitrum mainnet at block ~105_949_098
#             (http://127.0.0.1:8545 — started by scripts/run_anvil_fork.sh)
#   Events → Live Arbitrum sequencer feed (wss://arb1.arbitrum.io/feed)
#
# The bot uses Anvil's local RPC for all eth_call / getLogs / state queries,
# and simultaneously connects to the real sequencer feed for swap detection.
# Real swaps happening on mainnet right now are detected and simulated against
# the fork block state — slight staleness is acceptable for validation.
#
# dry_run = true means the full detect → simulate path runs but no transaction
# is ever broadcast.  This is the correct setting until the run validates that
# opportunities_cleared_simulation > 0 at least once.
#
# To run:  ./scripts/run_anvil_fork.sh
# To test: ./scripts/anvil_smoke_test.sh

[network]
rpc_url            = "http://127.0.0.1:8545"
sequencer_feed_url = "wss://arb1.arbitrum.io/feed"
chain_id           = 42161

[strategy]
# Lowered profit floor for validation purposes.
# We only need to prove simulate fires — not that we beat production thresholds.
min_profit_floor_usd  = 0.01
gas_buffer_multiplier = 1.1
# Relaxed ceiling: Anvil inherits mainnet base fee but we pay nothing.
# Accept a wider range so gas spikes do not suppress the validation run.
max_gas_gwei          = 0.5
flash_loan_fee_bps    = 0    # Balancer V2 is always 0

[pools]
balancer_vault     = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"
uniswap_v3_factory = "0x1F98431c8aD98523631AE4a59f267346ea31F984"
camelot_factory    = "0x6EcCab422D763aC031210895C81787E87B43A652"
sushiswap_factory  = "0xc35DADB65012eC5796536bD9864eD8773aBc74C4"
traderjoe_factory  = "0x9Ad6C38BE94206cA50bb0d90783181662f0CfA10"
# Scan the last ~50 000 blocks from the fork point to seed pool state from
# factory logs.  Anvil serves getLogs calls from its in-memory state so each
# 10-block chunk is near-instant — 5 000 chunks total, completes in seconds.
seed_from_block    = 105900000
known_pools        = []

[execution]
contract_address           = "${ARB_EXECUTOR_ADDRESS}"
private_key                = "${PRIVATE_KEY}"
max_concurrent_simulations = 5
gas_estimate_buffer        = 1.2
# NodeInterface precompile — present on all Arbitrum forks.
node_interface_address     = "0x00000000000000000000000000000000000000C8"
l2_gas_units               = 500000
receipt_timeout_secs       = 30
# Run the full simulation path but never broadcast a transaction on-chain.
# Remove or set to false once the Anvil validation run confirms the pipeline
# is healthy and you are ready to transition to Phase 10.
dry_run                    = true

[observability]
# Debug level so the full funnel is visible: pool seeding, swap detection,
# profit filtering, and simulation outcomes are all logged.
log_level    = "debug"
metrics_port = 9090
