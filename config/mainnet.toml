[network]
rpc_url            = "${ARBITRUM_RPC_URL}"
sequencer_feed_url = "wss://arb1.arbitrum.io/feed"
chain_id           = 42161

[strategy]
min_profit_floor_usd  = 0.50
gas_buffer_multiplier = 1.1
max_gas_gwei          = 0.1
flash_loan_fee_bps    = 0

[pools]
balancer_vault     = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"
uniswap_v3_factory = "0x1F98431c8aD98523631AE4a59f267346ea31F984"
camelot_factory    = "0x6EcCab422D763aC031210895C81787E87B43A652"
sushiswap_factory  = "0xc35DADB65012eC5796536bD9864eD8773aBc74C4"
traderjoe_factory  = "0x9Ad6C38BE94206cA50bb0d90783181662f0CfA10"

# Start with mid-tier pairs only — NOT USDC/ETH
# USDC/ETH is too competitive on $31 budget
known_pools = [
  "0x92c63d0e701caae670c9415d91c474d9b8b9b0a1",  # ARB/USDT Camelot
  "0x2f5e87c9313401c57a998e4e9f32ab89f910c304",  # WBTC/ETH UniV3 0.05%
  "0x149e36e72726e0bcea5c59d40df2c43f60f5a22d",  # WBTC/ETH UniV3 0.3%
]

[execution]
contract_address           = "${ARB_EXECUTOR_ADDRESS}"
private_key                = "${PRIVATE_KEY}"
max_concurrent_simulations = 5
gas_estimate_buffer        = 1.2
node_interface_address     = "0x00000000000000000000000000000000000000C8"
dry_run                    = false

[budget]
total_usd      = 27.00
kill_at_usd    = 2.00
warn_at_usd    = 5.00

[observability]
log_level    = "info"
metrics_port = 9090
