title = "arbx gitleaks config"

[[rules]]
id          = "ethereum-private-key"
description = "Ethereum private key in assignment context"
regex       = '''(?i)(private_?key|secret)\s*[=:]\s*["']?0x[0-9a-fA-F]{64}["']?'''
tags        = ["key", "ethereum"]
  [rules.allowlist]
  paths = [
    ".env.example",
    ".gitleaks.toml",
    ".github/",
    "ROADMAP.md",
    "SSOT.md",
    "docs/",
  ]

[[rules]]
id          = "alchemy-rpc-key"
description = "Alchemy API key in RPC URL"
regex       = '''https?://[a-z0-9-]+\.g?\.?alchemy\.com/v[0-9]+/[a-zA-Z0-9_-]{20,}'''
tags        = ["key", "alchemy"]
  [rules.allowlist]
  paths = [
    ".env.example",
    ".gitleaks.toml",
    ".github/",
    "ROADMAP.md",
    "SSOT.md",
    "docs/",
  ]

[allowlist]
paths = [
  ".env.example",
  ".gitleaks.toml",
  ".github/",
  "ROADMAP.md",
  "SSOT.md",
  "SECURITY.md",
  "docs/",
  "crates/",
  "tests/",
  "contracts/",
  "config/",
]
